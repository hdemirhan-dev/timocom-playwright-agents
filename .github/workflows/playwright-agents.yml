name: Playwright Agents

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true   # Healer fixes failures — we still want to export

      - name: Export agents-results.json
        run: node scripts/export-agents-results.js --out agents-results.json

      - name: Push results to dashboard repo
        env:
          PAT: ${{ secrets.DASHBOARD_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/hdemirhan-dev/demirhan-living-project.git /tmp/dashboard
          cp agents-results.json /tmp/dashboard/public/agents-results.json
          cd /tmp/dashboard
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/agents-results.json
          git diff --cached --quiet || git commit -m "chore: update agents-results.json [skip ci]"
          git push